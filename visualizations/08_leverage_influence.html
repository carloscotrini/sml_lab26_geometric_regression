<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leverage × Surprise = Influence</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.6em;
    font-weight: 300;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
    color: #f0f0f0;
  }
  .subtitle {
    font-size: 0.85em;
    color: #888;
    margin-bottom: 14px;
  }
  .main-container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .top-row {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  svg { display: block; }
  .canvas {
    background: #16213e;
    border-radius: 8px;
    border: 1px solid #2a2a4a;
  }
  .controls-row {
    display: flex;
    gap: 20px;
    margin-top: 12px;
    align-items: center;
  }
  .toggle-btn {
    background: #2a2a4a;
    border: 1px solid #444;
    color: #ccc;
    padding: 6px 14px;
    border-radius: 5px;
    font-size: 0.8em;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .toggle-btn:hover { background: #3a3a5a; }
  .toggle-btn.active { background: #50c878; color: #111; border-color: #50c878; }
  .readouts {
    display: flex;
    gap: 24px;
    margin-top: 10px;
    padding: 10px 24px;
    background: #16213e;
    border-radius: 8px;
    border: 1px solid #2a2a4a;
  }
  .readout { text-align: center; }
  .readout .label {
    font-size: 0.7em;
    color: #888;
    margin-bottom: 2px;
  }
  .readout .value {
    font-size: 1.0em;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .val-blue { color: #4a90d9; }
  .val-red { color: #e74c3c; }
  .val-gold { color: #e6a817; }
  .val-green { color: #50c878; }
  .val-warn { color: #e74c3c; }

  .tooltip-box {
    position: absolute;
    background: #222244;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 0.75em;
    color: #ddd;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
    max-width: 220px;
  }
  .instruction {
    font-size: 0.75em;
    color: #666;
    margin-top: 8px;
    font-style: italic;
  }
</style>
</head>
<body>
<h1>Leverage &#xD7; Surprise = Influence</h1>
<p class="subtitle">Drag the gold point to explore Cook's distance decomposition</p>

<div class="main-container">
  <div class="top-row">
    <svg id="scatterCanvas" class="canvas" width="480" height="420"></svg>
    <svg id="barCanvas" class="canvas" width="340" height="420"></svg>
  </div>
  <div class="controls-row">
    <button class="toggle-btn active" id="toggleLOO">Show leave-one-out line</button>
    <button class="toggle-btn" id="resetBtn">Reset points</button>
  </div>
  <div class="readouts">
    <div class="readout">
      <div class="label">h&#x1D62;&#x1D62; (leverage)</div>
      <div class="value val-blue" id="readH">0.00</div>
    </div>
    <div class="readout">
      <div class="label">e&#x1D62; (residual)</div>
      <div class="value val-red" id="readE">0.00</div>
    </div>
    <div class="readout">
      <div class="label">D&#x1D62; (Cook's)</div>
      <div class="value val-gold" id="readD">0.00</div>
    </div>
    <div class="readout">
      <div class="label">&#x2016;&#x177; &#x2212; &#x177;&#x208D;&#x1D62;&#x208E;&#x2016;</div>
      <div class="value val-green" id="readShift">0.00</div>
    </div>
  </div>
  <p class="instruction">Click any point to make it active. Drag the gold point freely.</p>
</div>

<div class="tooltip-box" id="tooltip"></div>

<script>
(function() {
  // ── Config ──
  const SW = 480, SH = 420;
  const BW = 340, BH = 420;
  const sm = { top: 40, right: 20, bottom: 45, left: 50 };
  const bm = { top: 40, right: 20, bottom: 45, left: 120 };
  const sw = SW - sm.left - sm.right;
  const sh = SH - sm.top - sm.bottom;
  const bw = BW - bm.left - bm.right;
  const bh = BH - bm.top - bm.bottom;

  const grayColor = '#888';
  const goldColor = '#e6a817';
  const greenColor = '#50c878';
  const blueColor = '#4a90d9';
  const redColor = '#e74c3c';

  let showLOO = true;
  let activeIdx = 9; // last point is active

  // ── Generate initial data ──
  // A nice linear trend with some noise
  const rng = d3.randomNormal(0, 1);
  let baseData = [
    { x: 1.0, y: 2.1 },
    { x: 2.0, y: 3.8 },
    { x: 2.5, y: 4.5 },
    { x: 3.0, y: 5.0 },
    { x: 3.5, y: 5.2 },
    { x: 4.0, y: 6.5 },
    { x: 5.0, y: 7.8 },
    { x: 5.5, y: 8.0 },
    { x: 6.0, y: 8.5 },
    { x: 7.5, y: 6.0 }, // active point starts as mild outlier
  ];

  let data = baseData.map(d => ({ ...d }));

  // ── Scales ──
  const xDomain = [-1, 10];
  const yDomain = [-2, 14];
  const xScale = d3.scaleLinear().domain(xDomain).range([0, sw]);
  const yScale = d3.scaleLinear().domain(yDomain).range([sh, 0]);

  // ── Scatter SVG ──
  const svgS = d3.select('#scatterCanvas');
  const gS = svgS.append('g').attr('transform', `translate(${sm.left},${sm.top})`);

  svgS.append('text')
    .attr('x', SW / 2).attr('y', 24)
    .attr('text-anchor', 'middle')
    .attr('fill', '#ccc').attr('font-size', '13px')
    .text('Scatter Plot with Regression Lines');

  // Axes
  const xAxis = d3.axisBottom(xScale).ticks(8).tickSize(-sh);
  const yAxis = d3.axisLeft(yScale).ticks(8).tickSize(-sw);

  const gXAxis = gS.append('g').attr('transform', `translate(0,${sh})`).call(xAxis)
    .call(g => {
      g.selectAll('line').attr('stroke', '#2a2a4a');
      g.selectAll('text').attr('fill', '#888').attr('font-size', '10px');
      g.select('.domain').attr('stroke', '#444');
    });
  const gYAxis = gS.append('g').call(yAxis)
    .call(g => {
      g.selectAll('line').attr('stroke', '#2a2a4a');
      g.selectAll('text').attr('fill', '#888').attr('font-size', '10px');
      g.select('.domain').attr('stroke', '#444');
    });

  gS.append('text')
    .attr('x', sw / 2).attr('y', sh + 38)
    .attr('text-anchor', 'middle')
    .attr('fill', '#aaa').attr('font-size', '12px').text('x');
  gS.append('text')
    .attr('transform', 'rotate(-90)')
    .attr('x', -sh / 2).attr('y', -35)
    .attr('text-anchor', 'middle')
    .attr('fill', '#aaa').attr('font-size', '12px').text('y');

  // Influence shaded region (between two lines)
  const influenceArea = gS.append('path')
    .attr('fill', redColor).attr('opacity', 0.1);

  // Full regression line
  const fullLine = gS.append('line')
    .attr('stroke', greenColor).attr('stroke-width', 2.5).attr('opacity', 0.9);

  // LOO line
  const looLine = gS.append('line')
    .attr('stroke', greenColor).attr('stroke-width', 2)
    .attr('stroke-dasharray', '6,4').attr('opacity', 0.7);

  // Residual line from active point to fit
  const residualLine = gS.append('line')
    .attr('stroke', redColor).attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '3,3').attr('opacity', 0.7);

  // Points group
  const pointsG = gS.append('g');

  // ── Bar SVG ──
  const svgB = d3.select('#barCanvas');
  const gB = svgB.append('g').attr('transform', `translate(${bm.left},${bm.top})`);

  svgB.append('text')
    .attr('x', BW / 2).attr('y', 24)
    .attr('text-anchor', 'middle')
    .attr('fill', '#ccc').attr('font-size', '13px')
    .text('Influence Decomposition');

  // Bar scale
  const barScale = d3.scaleLinear().domain([0, 3]).range([0, bw]);
  const barCategories = [
    { key: 'leverage', label: 'Leverage h\u1D62\u1D62/(1\u2212h\u1D62\u1D62)\u00B2', color: blueColor },
    { key: 'surprise', label: 'Surprise e\u1D62\u00B2/(p\u00B7MSE)', color: redColor },
    { key: 'cooks', label: "Cook's D\u1D62", color: goldColor },
  ];
  const barY = d3.scaleBand()
    .domain(barCategories.map(d => d.key))
    .range([0, 180])
    .padding(0.35);

  // Bar axis
  const barAxisG = gB.append('g')
    .attr('transform', `translate(0, 190)`);

  // Bar labels
  barCategories.forEach(cat => {
    gB.append('text')
      .attr('x', -8)
      .attr('y', barY(cat.key) + barY.bandwidth() / 2 + 4)
      .attr('text-anchor', 'end')
      .attr('fill', cat.color)
      .attr('font-size', '11px')
      .attr('font-weight', 600)
      .text(cat.label);
  });

  // Bars
  const bars = {};
  barCategories.forEach(cat => {
    bars[cat.key] = gB.append('rect')
      .attr('x', 0)
      .attr('y', barY(cat.key))
      .attr('height', barY.bandwidth())
      .attr('width', 0)
      .attr('fill', cat.color)
      .attr('opacity', 0.85)
      .attr('rx', 3);
  });

  // Bar value labels
  const barVals = {};
  barCategories.forEach(cat => {
    barVals[cat.key] = gB.append('text')
      .attr('y', barY(cat.key) + barY.bandwidth() / 2 + 4)
      .attr('fill', '#e0e0e0')
      .attr('font-size', '11px')
      .attr('font-weight', 600);
  });

  // ── Thermometer ──
  const thermoY = 230;
  const thermoH = 140;
  const thermoW = 22;
  const thermoX = bw / 2 - thermoW / 2;

  gB.append('text')
    .attr('x', bw / 2).attr('y', thermoY - 10)
    .attr('text-anchor', 'middle')
    .attr('fill', '#aaa').attr('font-size', '11px')
    .text("Cook's D\u1D62 Thermometer");

  // Thermometer background gradient
  const thermoDefs = svgB.append('defs');
  const thermoGrad = thermoDefs.append('linearGradient')
    .attr('id', 'thermoGrad')
    .attr('x1', '0%').attr('y1', '100%')
    .attr('x2', '0%').attr('y2', '0%');
  thermoGrad.append('stop').attr('offset', '0%').attr('stop-color', greenColor);
  thermoGrad.append('stop').attr('offset', '33%').attr('stop-color', greenColor);
  thermoGrad.append('stop').attr('offset', '33%').attr('stop-color', '#f1c40f');
  thermoGrad.append('stop').attr('offset', '67%').attr('stop-color', '#f1c40f');
  thermoGrad.append('stop').attr('offset', '67%').attr('stop-color', redColor);
  thermoGrad.append('stop').attr('offset', '100%').attr('stop-color', redColor);

  // Thermometer scale: 0 at bottom, 1.5 at top
  const thermoScale = d3.scaleLinear().domain([0, 1.5]).range([thermoH, 0]).clamp(true);

  // Background bar
  gB.append('rect')
    .attr('x', thermoX).attr('y', thermoY)
    .attr('width', thermoW).attr('height', thermoH)
    .attr('fill', 'url(#thermoGrad)')
    .attr('opacity', 0.3)
    .attr('rx', 4);

  // Border
  gB.append('rect')
    .attr('x', thermoX).attr('y', thermoY)
    .attr('width', thermoW).attr('height', thermoH)
    .attr('fill', 'none')
    .attr('stroke', '#555').attr('stroke-width', 1)
    .attr('rx', 4);

  // Zone labels
  const zoneLabelX = thermoX + thermoW + 8;
  gB.append('text').attr('x', zoneLabelX).attr('y', thermoY + thermoH - 10)
    .attr('fill', greenColor).attr('font-size', '9px').text('D < 0.5');
  gB.append('text').attr('x', zoneLabelX).attr('y', thermoY + thermoH * 0.5)
    .attr('fill', '#f1c40f').attr('font-size', '9px').text('0.5 \u2264 D < 1');
  gB.append('text').attr('x', zoneLabelX).attr('y', thermoY + 14)
    .attr('fill', redColor).attr('font-size', '9px').text('D \u2265 1');

  // Zone lines
  [0.5, 1.0].forEach(v => {
    gB.append('line')
      .attr('x1', thermoX - 4).attr('x2', thermoX + thermoW + 4)
      .attr('y1', thermoY + thermoScale(v))
      .attr('y2', thermoY + thermoScale(v))
      .attr('stroke', '#888').attr('stroke-width', 1)
      .attr('stroke-dasharray', '3,2');
  });

  // Mercury fill
  const mercury = gB.append('rect')
    .attr('x', thermoX + 2)
    .attr('width', thermoW - 4)
    .attr('rx', 3)
    .attr('opacity', 0.85);

  // Mercury indicator line
  const mercuryLine = gB.append('line')
    .attr('x1', thermoX - 6).attr('x2', thermoX + thermoW + 6)
    .attr('stroke', '#fff').attr('stroke-width', 2)
    .attr('opacity', 0.8);

  // Mercury value
  const mercuryLabel = gB.append('text')
    .attr('x', thermoX - 10)
    .attr('text-anchor', 'end')
    .attr('fill', '#fff').attr('font-size', '11px').attr('font-weight', 700);

  // ── Regression math ──
  function linReg(pts) {
    const n = pts.length;
    if (n < 2) return { b0: 0, b1: 0 };
    let sx = 0, sy = 0, sxx = 0, sxy = 0;
    pts.forEach(p => { sx += p.x; sy += p.y; sxx += p.x * p.x; sxy += p.x * p.y; });
    const denom = n * sxx - sx * sx;
    if (Math.abs(denom) < 1e-12) return { b0: sy / n, b1: 0 };
    const b1 = (n * sxy - sx * sy) / denom;
    const b0 = (sy - b1 * sx) / n;
    return { b0, b1 };
  }

  function predict(model, x) { return model.b0 + model.b1 * x; }

  function computeStats() {
    const n = data.length;
    const p = 2; // intercept + slope

    // Full model
    const fullModel = linReg(data);

    // LOO model (without active point)
    const looData = data.filter((_, i) => i !== activeIdx);
    const looModel = linReg(looData);

    // Active point
    const xi = data[activeIdx].x;
    const yi = data[activeIdx].y;
    const yhat_i = predict(fullModel, xi);
    const ei = yi - yhat_i;

    // Leverage: h_ii = 1/n + (x_i - x_bar)^2 / sum((x_j - x_bar)^2)
    const xbar = data.reduce((s, d) => s + d.x, 0) / n;
    const sxx = data.reduce((s, d) => s + (d.x - xbar) ** 2, 0);
    const hii = 1 / n + (xi - xbar) ** 2 / sxx;

    // MSE (full model)
    const mse = data.reduce((s, d) => s + (d.y - predict(fullModel, d.x)) ** 2, 0) / (n - p);

    // Cook's distance
    // D_i = (e_i^2 / (p * MSE)) * (h_ii / (1 - h_ii)^2)
    const leverageFactor = hii / (1 - hii) ** 2;
    const surpriseFactor = ei ** 2 / (p * mse);
    const cookD = surpriseFactor * leverageFactor;

    // Shift in fitted values
    let shiftNorm = 0;
    data.forEach(d => {
      const diff = predict(fullModel, d.x) - predict(looModel, d.x);
      shiftNorm += diff * diff;
    });
    shiftNorm = Math.sqrt(shiftNorm);

    return { fullModel, looModel, xi, yi, yhat_i, ei, hii, mse, leverageFactor, surpriseFactor, cookD, shiftNorm };
  }

  // ── Render ──
  function render() {
    const stats = computeStats();
    const { fullModel, looModel, xi, yi, yhat_i, ei, hii, leverageFactor, surpriseFactor, cookD, shiftNorm } = stats;

    // ── Scatter ──
    // Regression lines
    const xMin = xDomain[0], xMax = xDomain[1];
    fullLine
      .attr('x1', xScale(xMin)).attr('y1', yScale(predict(fullModel, xMin)))
      .attr('x2', xScale(xMax)).attr('y2', yScale(predict(fullModel, xMax)));

    looLine
      .attr('x1', xScale(xMin)).attr('y1', yScale(predict(looModel, xMin)))
      .attr('x2', xScale(xMax)).attr('y2', yScale(predict(looModel, xMax)))
      .attr('opacity', showLOO ? 0.7 : 0);

    // Influence area between lines
    if (showLOO) {
      const nPts = 40;
      const areaData = [];
      for (let i = 0; i <= nPts; i++) {
        const xv = xMin + (xMax - xMin) * i / nPts;
        areaData.push({ x: xv, yFull: predict(fullModel, xv), yLoo: predict(looModel, xv) });
      }
      const areaPath = d3.area()
        .x(d => xScale(d.x))
        .y0(d => yScale(d.yFull))
        .y1(d => yScale(d.yLoo));
      influenceArea.attr('d', areaPath(areaData)).attr('opacity', 0.1);
    } else {
      influenceArea.attr('opacity', 0);
    }

    // Residual line
    residualLine
      .attr('x1', xScale(xi)).attr('y1', yScale(yi))
      .attr('x2', xScale(xi)).attr('y2', yScale(yhat_i));

    // Points
    const circles = pointsG.selectAll('circle').data(data);
    circles.enter().append('circle')
      .attr('r', 0)
      .merge(circles)
      .attr('cx', d => xScale(d.x))
      .attr('cy', d => yScale(d.y))
      .attr('r', (d, i) => i === activeIdx ? 8 : 5)
      .attr('fill', (d, i) => i === activeIdx ? goldColor : grayColor)
      .attr('stroke', (d, i) => i === activeIdx ? '#fff' : 'none')
      .attr('stroke-width', (d, i) => i === activeIdx ? 2 : 0)
      .attr('cursor', 'pointer')
      .attr('opacity', (d, i) => i === activeIdx ? 1 : 0.7);
    circles.exit().remove();

    // ── Bars ──
    const maxBar = Math.max(3, leverageFactor * 1.2, surpriseFactor * 1.2, cookD * 1.2);
    barScale.domain([0, maxBar]);

    barAxisG.call(d3.axisBottom(barScale).ticks(5).tickSize(-190))
      .call(g => {
        g.selectAll('line').attr('stroke', '#2a2a4a');
        g.selectAll('text').attr('fill', '#888').attr('font-size', '10px');
        g.select('.domain').attr('stroke', '#444');
      });

    const barData = {
      leverage: leverageFactor,
      surprise: surpriseFactor,
      cooks: cookD,
    };

    barCategories.forEach(cat => {
      const v = barData[cat.key];
      const w = Math.max(0, barScale(v));
      bars[cat.key].transition().duration(60)
        .attr('width', w);
      barVals[cat.key]
        .attr('x', w + 6)
        .text(v.toFixed(3));
    });

    // ── Thermometer ──
    const clampD = Math.min(cookD, 1.5);
    const mh = thermoH - thermoScale(clampD);
    const mColor = cookD < 0.5 ? greenColor : cookD < 1 ? '#f1c40f' : redColor;
    mercury.transition().duration(60)
      .attr('y', thermoY + thermoScale(clampD))
      .attr('height', Math.max(0, mh))
      .attr('fill', mColor);

    mercuryLine
      .attr('y1', thermoY + thermoScale(clampD))
      .attr('y2', thermoY + thermoScale(clampD));

    mercuryLabel
      .attr('y', thermoY + thermoScale(clampD) + 4)
      .text(cookD.toFixed(3));

    // ── Readouts ──
    d3.select('#readH').text(hii.toFixed(4));
    d3.select('#readE').text(ei.toFixed(3));
    d3.select('#readD').text(cookD.toFixed(4))
      .attr('class', 'value ' + (cookD >= 1 ? 'val-warn' : 'val-gold'));
    d3.select('#readShift').text(shiftNorm.toFixed(3));
  }

  // ── Drag behavior for active point ──
  function setupDrag() {
    const drag = d3.drag()
      .on('drag', function(event) {
        const [mx, my] = d3.pointer(event, gS.node());
        const newX = xScale.invert(mx);
        const newY = yScale.invert(my);
        data[activeIdx].x = Math.max(xDomain[0] + 0.2, Math.min(xDomain[1] - 0.2, newX));
        data[activeIdx].y = Math.max(yDomain[0] + 0.2, Math.min(yDomain[1] - 0.2, newY));
        render();
      });

    pointsG.selectAll('circle')
      .on('click', function(event, d) {
        const idx = data.indexOf(d);
        if (idx >= 0) {
          activeIdx = idx;
          render();
          setupDrag();
        }
      })
      .filter((d, i) => i === activeIdx)
      .call(drag);
  }

  // ── Toggle LOO ──
  d3.select('#toggleLOO').on('click', function() {
    showLOO = !showLOO;
    d3.select(this).classed('active', showLOO);
    render();
  });

  // ── Reset ──
  d3.select('#resetBtn').on('click', function() {
    data = baseData.map(d => ({ ...d }));
    activeIdx = 9;
    render();
    setupDrag();
  });

  // ── Tooltip ──
  const tooltip = d3.select('#tooltip');
  d3.select('#toggleLOO')
    .on('mouseenter', e => {
      tooltip.style('opacity', 1)
        .style('left', (e.pageX + 12) + 'px')
        .style('top', (e.pageY - 20) + 'px')
        .text('Toggle the leave-one-out regression line (fit without the active point).');
    })
    .on('mouseleave', () => tooltip.style('opacity', 0));

  // ── Init ──
  render();
  setupDrag();
})();
</script>
</body>
</html>
