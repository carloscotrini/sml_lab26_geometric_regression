<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pancake Column Space</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
    color: #ccc;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #777;
    margin-bottom: 16px;
  }
  .container {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  svg {
    background: #12122a;
    border-radius: 8px;
    border: 1px solid #2a2a4a;
  }
  .panel-right {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 280px;
  }
  .control-group {
    background: #12122a;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 14px;
  }
  .control-group label {
    display: block;
    font-size: 0.78rem;
    color: #999;
    margin-bottom: 6px;
  }
  .control-group .value {
    font-size: 0.9rem;
    color: #e0e0e0;
    font-weight: 500;
    margin-bottom: 8px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #2a2a4a;
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #4a90d9;
    cursor: pointer;
    border: 2px solid #1a1a2e;
  }
  button {
    background: #2a2a4a;
    color: #e0e0e0;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    width: 100%;
    margin-top: 6px;
  }
  button:hover {
    background: #3a3a5a;
    border-color: #4a90d9;
  }
  .readout {
    background: #12122a;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 14px;
  }
  .readout h3 {
    font-size: 0.75rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .readout-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    margin-bottom: 4px;
  }
  .readout-row .label { color: #888; }
  .readout-row .val { color: #e0e0e0; font-variant-numeric: tabular-nums; }
  .readout-row .val.warn { color: #e74c3c; }
  .readout-row .val.ok { color: #50c878; }
  .eigenbar-container {
    display: flex;
    gap: 12px;
    margin-top: 6px;
  }
  .eigenbar-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .eigenbar-bg {
    width: 32px;
    height: 100px;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .eigenbar-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    border-radius: 0 0 3px 3px;
    transition: height 0.4s ease, background 0.4s ease;
  }
  .eigenbar-label {
    font-size: 0.7rem;
    color: #888;
    margin-top: 4px;
  }
  .eigenbar-val {
    font-size: 0.75rem;
    color: #ccc;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .tooltip-text {
    font-size: 0.7rem;
    color: #666;
    margin-top: 6px;
    line-height: 1.4;
    font-style: italic;
  }
</style>
</head>
<body>
<h1>The Pancake Column Space</h1>
<p class="subtitle">How collinearity inflates coefficients while predictions stay stable</p>
<div class="container">
  <svg id="canvas" width="500" height="500"></svg>
  <div class="panel-right">
    <div class="control-group">
      <label>Angle between x₁ and x₂</label>
      <div class="value" id="angle-display">45°</div>
      <input type="range" id="angle-slider" min="5" max="90" value="45" step="1"
             title="Drag to change the angle between predictor vectors">
      <p class="tooltip-text">Small angles → ill-conditioned (pancake). Large angles → well-conditioned.</p>
    </div>
    <div class="control-group">
      <button id="btn-perturb" title="Add small random noise to y and recompute the projection">Perturb y once</button>
      <button id="btn-perturb50" title="Add 50 independent perturbations and show the cloud of coefficient vectors">Perturb 50 times</button>
      <button id="btn-reset" title="Reset to the original y vector">Reset y</button>
    </div>
    <div class="readout">
      <h3>Eigenvalues of X⊤X</h3>
      <div class="eigenbar-container">
        <div class="eigenbar-wrapper">
          <div class="eigenbar-bg"><div class="eigenbar-fill" id="ebar1"></div></div>
          <div class="eigenbar-label">λ₁</div>
          <div class="eigenbar-val" id="eval1">—</div>
        </div>
        <div class="eigenbar-wrapper">
          <div class="eigenbar-bg"><div class="eigenbar-fill" id="ebar2"></div></div>
          <div class="eigenbar-label">λ₂</div>
          <div class="eigenbar-val" id="eval2">—</div>
        </div>
      </div>
    </div>
    <div class="readout">
      <h3>Statistics</h3>
      <div class="readout-row"><span class="label">κ(X⊤X)</span><span class="val" id="kappa">—</span></div>
      <div class="readout-row"><span class="label">β̂₁</span><span class="val" id="beta1">—</span></div>
      <div class="readout-row"><span class="label">β̂₂</span><span class="val" id="beta2">—</span></div>
      <div class="readout-row"><span class="label">SE(β̂₁)</span><span class="val" id="se1">—</span></div>
      <div class="readout-row"><span class="label">SE(β̂₂)</span><span class="val" id="se2">—</span></div>
      <div class="readout-row"><span class="label">‖ŷ‖</span><span class="val" id="yhat-norm">—</span></div>
    </div>
  </div>
</div>

<script>
(function() {
  const W = 500, H = 500;
  const cx = W / 2, cy = H / 2;
  const scale = 100; // pixels per unit

  const svg = d3.select("#canvas");

  // Defs for arrowheads
  const defs = svg.append("defs");
  function makeArrow(id, color) {
    defs.append("marker").attr("id", id)
      .attr("viewBox", "0 0 10 6").attr("refX", 10).attr("refY", 3)
      .attr("markerWidth", 8).attr("markerHeight", 6).attr("orient", "auto")
      .append("path").attr("d", "M0,0 L10,3 L0,6 Z").attr("fill", color);
  }
  makeArrow("arr-blue", "#4a90d9");
  makeArrow("arr-green", "#50c878");
  makeArrow("arr-gold", "#e6a817");
  makeArrow("arr-gray", "#888");

  // Layers
  const gParallel = svg.append("g");
  const gCloud = svg.append("g");
  const gDecomp = svg.append("g");
  const gVectors = svg.append("g");
  const gLabels = svg.append("g");

  // Grid
  const gGrid = svg.insert("g", ":first-child");
  for (let i = -4; i <= 4; i++) {
    gGrid.append("line").attr("x1", cx + i * scale).attr("y1", 0)
      .attr("x2", cx + i * scale).attr("y2", H)
      .attr("stroke", "#1e1e3a").attr("stroke-width", 0.5);
    gGrid.append("line").attr("x1", 0).attr("y1", cy + i * scale)
      .attr("x2", W).attr("y2", cy + i * scale)
      .attr("stroke", "#1e1e3a").attr("stroke-width", 0.5);
  }
  // Axes
  gGrid.append("line").attr("x1", 0).attr("y1", cy).attr("x2", W).attr("y2", cy)
    .attr("stroke", "#2a2a4a").attr("stroke-width", 1);
  gGrid.append("line").attr("x1", cx).attr("y1", 0).attr("x2", cx).attr("y2", H)
    .attr("stroke", "#2a2a4a").attr("stroke-width", 1);

  // State
  let angleDeg = 45;
  const yBase = [0.8, 1.6]; // base y vector in 2D
  let yCurrent = [...yBase];
  let perturbCloud = [];

  function toScreen(v) { return [cx + v[0] * scale, cy - v[1] * scale]; }

  function getVectors(angle) {
    const rad = angle * Math.PI / 180;
    const x1 = [1.8, 0];
    const x2 = [1.8 * Math.cos(rad), 1.8 * Math.sin(rad)];
    return { x1, x2 };
  }

  // Solve β̂ = (X^T X)^{-1} X^T y  where X = [x1 | x2] columns
  function solve(x1, x2, y) {
    const a = x1[0]*x1[0] + x1[1]*x1[1];
    const b = x1[0]*x2[0] + x1[1]*x2[1];
    const c = x2[0]*x2[0] + x2[1]*x2[1];
    const d1 = x1[0]*y[0] + x1[1]*y[1];
    const d2 = x2[0]*y[0] + x2[1]*y[1];
    const det = a*c - b*b;
    if (Math.abs(det) < 1e-12) return { beta: [0, 0], yhat: [0, 0] };
    const b1 = (c*d1 - b*d2) / det;
    const b2 = (a*d2 - b*d1) / det;
    const yhat = [b1*x1[0]+b2*x2[0], b1*x1[1]+b2*x2[1]];
    return { beta: [b1, b2], yhat };
  }

  function eigenvalues(x1, x2) {
    const a = x1[0]*x1[0] + x1[1]*x1[1];
    const b = x1[0]*x2[0] + x1[1]*x2[1];
    const c = x2[0]*x2[0] + x2[1]*x2[1];
    const tr = a + c;
    const det = a*c - b*b;
    const disc = Math.sqrt(Math.max(0, tr*tr - 4*det));
    return [(tr + disc)/2, (tr - disc)/2];
  }

  function standardErrors(x1, x2, y, yhat) {
    const n = 2; // dimension
    const p = 2; // predictors
    const resid = [y[0]-yhat[0], y[1]-yhat[1]];
    const rss = resid[0]*resid[0] + resid[1]*resid[1];
    // Since n=p, we can't estimate sigma^2 from residuals in the usual way.
    // Use a fixed small sigma for illustration, or rss itself as proxy.
    const sigma2 = Math.max(rss, 0.001);

    const a = x1[0]*x1[0] + x1[1]*x1[1];
    const b = x1[0]*x2[0] + x1[1]*x2[1];
    const c = x2[0]*x2[0] + x2[1]*x2[1];
    const det = a*c - b*b;
    if (Math.abs(det) < 1e-12) return [Infinity, Infinity];
    // (X^TX)^{-1} diagonal
    const v1 = c / det;
    const v2 = a / det;
    return [Math.sqrt(sigma2 * v1), Math.sqrt(sigma2 * v2)];
  }

  function draw() {
    const { x1, x2 } = getVectors(angleDeg);
    const { beta, yhat } = solve(x1, x2, yCurrent);
    const evals = eigenvalues(x1, x2);
    const se = standardErrors(x1, x2, yCurrent, yhat);
    const kappa = evals[0] / Math.max(evals[1], 1e-12);

    // -- Parallelogram (column space shape) --
    const p0 = toScreen([0,0]);
    const p1 = toScreen(x1);
    const p2 = toScreen(x2);
    const p3 = toScreen([x1[0]+x2[0], x1[1]+x2[1]]);
    const parallelPath = `M${p0[0]},${p0[1]} L${p1[0]},${p1[1]} L${p3[0]},${p3[1]} L${p2[0]},${p2[1]} Z`;

    gParallel.selectAll("path").data([0]).join("path")
      .attr("d", parallelPath)
      .attr("fill", "#4a90d9").attr("fill-opacity", 0.08)
      .attr("stroke", "#4a90d9").attr("stroke-opacity", 0.2).attr("stroke-width", 1);

    // -- Vectors x1, x2 --
    const vecData = [
      { v: x1, color: "#4a90d9", label: "x₁", arrow: "arr-blue" },
      { v: x2, color: "#4a90d9", label: "x₂", arrow: "arr-blue" },
    ];
    gVectors.selectAll("line.vec").data(vecData).join("line").attr("class", "vec")
      .attr("x1", p0[0]).attr("y1", p0[1])
      .attr("x2", d => toScreen(d.v)[0]).attr("y2", d => toScreen(d.v)[1])
      .attr("stroke", d => d.color).attr("stroke-width", 2.5)
      .attr("marker-end", d => `url(#${d.arrow})`);

    gLabels.selectAll("text.vec-label").data(vecData).join("text").attr("class", "vec-label")
      .attr("x", d => toScreen(d.v)[0] + 8).attr("y", d => toScreen(d.v)[1] - 8)
      .attr("fill", d => d.color).attr("font-size", "14px").attr("font-weight", 600)
      .text(d => d.label);

    // -- y vector (gray) --
    const yScreen = toScreen(yCurrent);
    gVectors.selectAll("line.y-vec").data([0]).join("line").attr("class", "y-vec")
      .attr("x1", p0[0]).attr("y1", p0[1])
      .attr("x2", yScreen[0]).attr("y2", yScreen[1])
      .attr("stroke", "#888").attr("stroke-width", 2)
      .attr("marker-end", "url(#arr-gray)");
    gLabels.selectAll("text.y-label").data([0]).join("text").attr("class", "y-label")
      .attr("x", yScreen[0] + 8).attr("y", yScreen[1] - 8)
      .attr("fill", "#888").attr("font-size", "14px").attr("font-weight", 600)
      .text("y");

    // -- ŷ vector (green) --
    const yhatScreen = toScreen(yhat);
    gVectors.selectAll("line.yhat-vec").data([0]).join("line").attr("class", "yhat-vec")
      .attr("x1", p0[0]).attr("y1", p0[1])
      .attr("x2", yhatScreen[0]).attr("y2", yhatScreen[1])
      .attr("stroke", "#50c878").attr("stroke-width", 2.5)
      .attr("marker-end", "url(#arr-green)");
    gLabels.selectAll("text.yhat-label").data([0]).join("text").attr("class", "yhat-label")
      .attr("x", yhatScreen[0] + 8).attr("y", yhatScreen[1] + 4)
      .attr("fill", "#50c878").attr("font-size", "14px").attr("font-weight", 600)
      .text("ŷ");

    // -- Residual line y - ŷ (dotted) --
    gVectors.selectAll("line.resid").data([0]).join("line").attr("class", "resid")
      .attr("x1", yScreen[0]).attr("y1", yScreen[1])
      .attr("x2", yhatScreen[0]).attr("y2", yhatScreen[1])
      .attr("stroke", "#e74c3c").attr("stroke-width", 1.2)
      .attr("stroke-dasharray", "4,3").attr("opacity", 0.7);

    // -- Decomposition: β̂₁x₁ then β̂₂x₂ (dashed gold) --
    const step1 = [beta[0]*x1[0], beta[0]*x1[1]];
    const s1 = toScreen(step1);
    gDecomp.selectAll("line.decomp1").data([0]).join("line").attr("class", "decomp1")
      .attr("x1", p0[0]).attr("y1", p0[1])
      .attr("x2", s1[0]).attr("y2", s1[1])
      .attr("stroke", "#e6a817").attr("stroke-width", 1.8)
      .attr("stroke-dasharray", "6,4").attr("opacity", 0.8)
      .attr("marker-end", "url(#arr-gold)");
    gDecomp.selectAll("line.decomp2").data([0]).join("line").attr("class", "decomp2")
      .attr("x1", s1[0]).attr("y1", s1[1])
      .attr("x2", yhatScreen[0]).attr("y2", yhatScreen[1])
      .attr("stroke", "#e6a817").attr("stroke-width", 1.8)
      .attr("stroke-dasharray", "6,4").attr("opacity", 0.8)
      .attr("marker-end", "url(#arr-gold)");

    // Decomposition labels
    gLabels.selectAll("text.d1-label").data([0]).join("text").attr("class", "d1-label")
      .attr("x", (p0[0]+s1[0])/2 - 10).attr("y", (p0[1]+s1[1])/2 + 16)
      .attr("fill", "#e6a817").attr("font-size", "11px").attr("opacity", 0.8)
      .text(`β̂₁x₁`);
    gLabels.selectAll("text.d2-label").data([0]).join("text").attr("class", "d2-label")
      .attr("x", (s1[0]+yhatScreen[0])/2 + 6).attr("y", (s1[1]+yhatScreen[1])/2 - 6)
      .attr("fill", "#e6a817").attr("font-size", "11px").attr("opacity", 0.8)
      .text(`β̂₂x₂`);

    // -- Cloud of perturbed β̂ (shown as ŷ dots on canvas) --
    // Show both ŷ dots (green) and decomposition endpoints
    const cloudYhat = perturbCloud.map(pc => {
      const { yhat: yh } = solve(x1, x2, pc);
      return toScreen(yh);
    });
    gCloud.selectAll("circle.cloud-yhat").data(cloudYhat).join("circle").attr("class", "cloud-yhat")
      .attr("cx", d => d[0]).attr("cy", d => d[1])
      .attr("r", 3).attr("fill", "#50c878").attr("opacity", 0.35);

    // Show β̂ cloud as scaled vectors from origin — plot as dots in coefficient space
    // Actually, let's show the decomposition step1 endpoints to visualize β̂₁x₁ variation
    const cloudStep1 = perturbCloud.map(pc => {
      const { beta: b } = solve(x1, x2, pc);
      return toScreen([b[0]*x1[0], b[0]*x1[1]]);
    });
    gCloud.selectAll("circle.cloud-step").data(cloudStep1).join("circle").attr("class", "cloud-step")
      .attr("cx", d => d[0]).attr("cy", d => d[1])
      .attr("r", 2.5).attr("fill", "#e6a817").attr("opacity", 0.3);

    // -- Readouts --
    d3.select("#eval1").text(evals[0].toFixed(2));
    d3.select("#eval2").text(evals[1].toFixed(4));
    d3.select("#ebar1").style("height", `${Math.min(100, evals[0] / 8 * 100)}%`)
      .style("background", "#4a90d9");
    d3.select("#ebar2").style("height", `${Math.min(100, evals[1] / 8 * 100)}%`)
      .style("background", evals[1] < 0.5 ? "#e74c3c" : "#4a90d9");

    const kappaEl = d3.select("#kappa");
    kappaEl.text(kappa.toFixed(1));
    kappaEl.classed("warn", kappa > 20).classed("ok", kappa <= 5);

    d3.select("#beta1").text(beta[0].toFixed(3));
    d3.select("#beta2").text(beta[1].toFixed(3));
    d3.select("#se1").text(se[0].toFixed(3));
    d3.select("#se2").text(se[1].toFixed(3));
    d3.select("#yhat-norm").text(Math.sqrt(yhat[0]*yhat[0]+yhat[1]*yhat[1]).toFixed(3));
  }

  // -- Controls --
  const slider = d3.select("#angle-slider");
  slider.on("input", function() {
    angleDeg = +this.value;
    d3.select("#angle-display").text(`${angleDeg}°`);
    perturbCloud = [];
    yCurrent = [...yBase];
    draw();
  });

  d3.select("#btn-perturb").on("click", () => {
    const noise = [0.15 * (Math.random()-0.5), 0.15 * (Math.random()-0.5)];
    yCurrent = [yBase[0] + noise[0], yBase[1] + noise[1]];
    perturbCloud = [];
    draw();
  });

  d3.select("#btn-perturb50").on("click", () => {
    perturbCloud = [];
    for (let i = 0; i < 50; i++) {
      const noise = [0.15 * (Math.random()-0.5), 0.15 * (Math.random()-0.5)];
      perturbCloud.push([yBase[0] + noise[0], yBase[1] + noise[1]]);
    }
    yCurrent = perturbCloud[perturbCloud.length - 1];
    draw();
  });

  d3.select("#btn-reset").on("click", () => {
    yCurrent = [...yBase];
    perturbCloud = [];
    draw();
  });

  draw();
})();
</script>
</body>
</html>
